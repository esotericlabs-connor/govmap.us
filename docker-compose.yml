services:
  postgres:
    image: postgres:16-alpine
    container_name: govmap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: govmap
      # Dev default only. In production set POSTGRES_PASSWORD (and a matching
      # DATABASE_URL) in an .env file next to this compose file — never ship
      # the "govmap" default to a reachable host.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-govmap}
      POSTGRES_DB: govmap
    ports:
      # Bound to loopback only. Docker publishes ports by writing iptables
      # rules that BYPASS ufw, so a plain "5432:5432" would expose Postgres
      # to every interface regardless of firewall rules. The app reaches
      # Postgres over the compose network by service name, not this port;
      # this mapping is only for host-side tools (psql, alembic).
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U govmap"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: govmap-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://govmap:${POSTGRES_PASSWORD:-govmap}@postgres:5432/govmap
      CORS_ORIGINS: ${CORS_ORIGINS:-https://govmap.us,https://app.govmap.us}
      # Optional: set these in the .env next to this file to unlock the
      # /internal/* ops endpoints. Left unset = those endpoints stay locked.
      INTERNAL_USER: ${INTERNAL_USER:-}
      INTERNAL_PASSWORD: ${INTERNAL_PASSWORD:-}
      # Optional pipeline-failure webhook + the Congress.gov API key (bills/votes).
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
      CONGRESS_GOV_API_KEY: ${CONGRESS_GOV_API_KEY:-}
      # Which Congress to track, and how many recently-updated bills to enrich
      # per refresh. Defaults are fine; override in .env to roll to the 120th in
      # Jan 2027 or to widen bill coverage.
      CONGRESS_NUMBER: ${CONGRESS_NUMBER:-119}
      CONGRESS_GOV_BILL_LIMIT: ${CONGRESS_GOV_BILL_LIMIT:-250}
    ports:
      # Loopback only — for host-side tooling and the deploy health check.
      # The tunnel reaches this over the compose network at http://backend:8000.
      - "127.0.0.1:8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the client bundle at build time (see frontend/Dockerfile).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.govmap.us}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://app.govmap.us}
        NEXT_PUBLIC_MARKETING_URL: ${NEXT_PUBLIC_MARKETING_URL:-https://govmap.us}
    container_name: govmap-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # Server-side rendering reaches the backend directly over the compose
      # network instead of hairpinning through the public API hostname.
      API_INTERNAL_URL: http://backend:8000
    ports:
      # Loopback only — for host-side tooling. The tunnel reaches this over the
      # compose network at http://frontend:3000.
      - "127.0.0.1:3000:3000"

  # Cloudflare Tunnel connector, run as part of the stack so `docker compose up`
  # brings the public site up too — no systemd unit or on-disk credentials.
  # Runs ONLY when CLOUDFLARE_TUNNEL_TOKEN is set (the `tunnel` profile, which
  # scripts/deploy.sh enables automatically when the token is present in .env).
  # This is a DASHBOARD-managed tunnel: create the tunnel and its Public
  # Hostnames in the Cloudflare Zero Trust dashboard, pointing them at the
  # in-network services — govmap.us & app.govmap.us -> http://frontend:3000,
  # api.govmap.us -> http://backend:8000. cloudflared shares the compose
  # network, so those service names resolve.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: govmap-cloudflared
    restart: unless-stopped
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - frontend
      - backend

volumes:
  postgres-data:
