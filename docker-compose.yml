services:
  postgres:
    image: postgres:16-alpine
    container_name: govmap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: govmap
      POSTGRES_PASSWORD: govmap
      POSTGRES_DB: govmap
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
