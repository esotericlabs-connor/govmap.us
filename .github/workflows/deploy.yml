name: Deploy

# Auto-deploy on push to main, executed by a self-hosted GitHub Actions runner
# installed on the govmap VM. The runner just invokes the repo's deploy script
# — the same one you'd run by hand — so there's a single deploy path. No SSH,
# no exposed ports.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never let two deploys run at once.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Run deploy script
        run: bash /opt/govmap/scripts/deploy.sh
